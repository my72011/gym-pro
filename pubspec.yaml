name: gymcoach_pro
description: A production-ready Flutter fitness application built without AI.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  flutter_launcher_icons: ^0.13.1
  flutter_riverpod: ^2.6.1
  
  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # UI & Media
  cached_network_image: ^3.4.0
  video_player: ^2.12.0
  
  # Utilities & PDF
  pdf: ^3.10.8
  path_provider: ^2.1.3
  intl: ^0.19.0
  fl_chart: ^0.68.0
  share_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  
  build_runner: ^2.4.13
  hive_generator: ^2.0.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/gym coach.png" # هنا بتكتب مسار صورتك
  min_sdk_android: 21 # اختيارية لتفادي بعض المشاكل في أندرويد