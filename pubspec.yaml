name: zen_budget
description: A minimalist personal finance application with calm, elegant design.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Icons
  cupertino_icons: ^1.0.6
  
  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Fonts
  google_fonts: ^6.1.0
  
  # Utilities
  intl: ^0.19.0
  uuid: ^4.3.3
  
  # Path utilities
  path_provider: ^2.1.2
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  # Linting
  flutter_lints: ^3.0.0
  
  # Icon Generator
  flutter_launcher_icons: ^0.13.1

# Flutter Launcher Icons Configuration
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/zen_budget_icon.png"
  # Adaptive icon for Android 8.0+
  adaptive_icon_foreground: "assets/icons/zen_budget_icon.png"
  adaptive_icon_background: "#5B8DEF"

flutter:
  uses-material-design: true
  
 
  assets:
    - assets/icons/
  
  